<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Post.Title}} - {{.Site.Title}}</title>
    <meta name="description" content="{{if .Post.Description}}{{.Post.Description}}{{else}}{{.Site.Description}}{{end}}">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed.xml">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            color: #333;
        }
        a { color: #0066cc; text-decoration: none; }
        a:hover { text-decoration: underline; }
        header { margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
        header h1 { margin: 0; }
        header h1 a { color: inherit; }
        nav { margin-top: 0.5rem; }
        nav a { margin-right: 1rem; }
        article { margin-bottom: 2rem; }
        .post-meta { color: #666; font-size: 0.9rem; margin-bottom: 1rem; }
        .post-tags { margin-top: 1rem; }
        .post-tags a {
            background: #f0f0f0;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            margin-right: 0.5rem;
            font-size: 0.85rem;
        }
        pre { background: #f5f5f5; padding: 1rem; overflow-x: auto; border-radius: 4px; }
        code { background: #f5f5f5; padding: 0.2rem 0.4rem; border-radius: 3px; }
        pre code { background: none; padding: 0; }
        img { max-width: 100%; height: auto; }
        blockquote { border-left: 3px solid #ddd; margin-left: 0; padding-left: 1rem; color: #666; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; color: #666; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/">{{.Site.Title}}</a></h1>
        <nav>
            <a href="/">Home</a>
            <a href="/feed.xml">RSS</a>
        </nav>
    </header>
    <main>
        <article>
            <h1>{{.Post.Title}}</h1>
            <div class="post-meta">
                <time datetime="{{.Post.RFCDate}}">{{.Post.FormattedDate}}</time>
            </div>
            <div class="post-content">
                {{.Post.HTML}}
            </div>
            {{if .Post.Tags}}
            <div class="post-tags">
                {{range .Post.Tags}}
                <a href="#">#{{.}}</a>
                {{end}}
            </div>
            {{end}}
        </article>
    </main>
    <footer>
        <p>&copy; {{.Site.Author}}</p>
    </footer>
</body>
</html>
